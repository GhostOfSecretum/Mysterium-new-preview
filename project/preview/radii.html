<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-base); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .tok { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 58px; height: 58px; background: rgba(64,224,208,0.10); border: 1px solid rgba(64,224,208,0.25); }
  .name { font-family: var(--font-display); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-main); }
  .val  { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
</style></head>
<body>
<div class="grid">
  <div class="tok"><div class="box" style="border-radius: 8px"></div><div class="name">xs</div><div class="val">8px</div></div>
  <div class="tok"><div class="box" style="border-radius: 10px"></div><div class="name">sm</div><div class="val">10px</div></div>
  <div class="tok"><div class="box" style="border-radius: 14px"></div><div class="name">md</div><div class="val">14px</div></div>
  <div class="tok"><div class="box" style="border-radius: 18px"></div><div class="name">lg</div><div class="val">18px</div></div>
  <div class="tok"><div class="box" style="border-radius: 24px"></div><div class="name">xl</div><div class="val">24px</div></div>
  <div class="tok"><div class="box" style="border-radius: 32px"></div><div class="name">2xl</div><div class="val">32px</div></div>
  <div class="tok"><div class="box" style="border-radius: 999px"></div><div class="name">pill</div><div class="val">999px</div></div>
</div>
</body></html>
