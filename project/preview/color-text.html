<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-base); }
  .row { display: grid; grid-template-columns: 44px 1fr auto; gap: 14px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: 0; }
  .chip { width: 44px; height: 44px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.04); }
  .name { font-family: var(--font-display); font-size: 12px; font-weight: 600; }
  .role { font-family: var(--font-body); font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
</style></head>
<body>
<div class="row"><div class="chip" style="background:#d8eaf4"></div><div><div class="name" style="color:#d8eaf4">Text Main</div><div class="role">Primary body & headings</div></div><span class="hex">#D8EAF4</span></div>
<div class="row"><div class="chip" style="background:#ffffff"></div><div><div class="name" style="color:#ffffff">Text High</div><div class="role">Emphatic / footer links</div></div><span class="hex">#FFFFFF</span></div>
<div class="row"><div class="chip" style="background:#6ba8c8"></div><div><div class="name" style="color:#6ba8c8">Text Muted</div><div class="role">Secondary copy, captions</div></div><span class="hex">#6BA8C8</span></div>
<div class="row"><div class="chip" style="background:#3d6a82"></div><div><div class="name" style="color:#3d6a82">Text Dim</div><div class="role">Tertiary / placeholder</div></div><span class="hex">#3D6A82</span></div>
<div class="row"><div class="chip" style="background:#40e0d0"></div><div><div class="name" style="color:#40e0d0">Accent Text</div><div class="role">Brand highlight in copy</div></div><span class="hex">#40E0D0</span></div>
</body></html>
