<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-base); }
  .price-card {
    background: rgba(2,10,24,0.62); border: 1px solid rgba(64,224,208,0.07);
    box-shadow: 0 20px 45px rgba(1,4,10,0.6); backdrop-filter: blur(14px);
    border-radius: 24px; padding: 22px; width: 220px; display: inline-flex; flex-direction: column; gap: 8px;
    vertical-align: top; margin-right: 12px;
  }
  .price-card.featured {
    background:
      linear-gradient(150deg, rgba(64,224,208,0.10), rgba(26,143,168,0.05)),
      rgba(2,10,24,0.9);
    border-color: rgba(64,224,208,0.25);
  }
  .tag { font-family:var(--font-display); font-size: 9px; text-transform:uppercase; letter-spacing: 0.08em; color: var(--accent); }
  h3 { font-family: var(--font-display); font-size: 15px; margin: 0; }
  .price { font-family: var(--font-display); font-size: 30px; font-weight: 700; margin: 6px 0 2px; }
  .price span { font-size: 14px; margin-left: 4px; color: var(--text-muted); font-weight: 500; }
  .note { margin: 0; color: var(--text-muted); font-size: 12.5px; }
  button {
    margin-top: 8px; width: 100%;
    border-radius: 999px; padding: 10px 14px;
    font-family: var(--font-display); font-size: 10.5px; font-weight: 600;
    background: linear-gradient(135deg,#1a8fa8,#0d6878); color: #e0f4ff;
    border: 1px solid rgba(64,224,208,0.3); cursor: pointer;
  }
</style></head>
<body>
<div class="price-card">
  <h3>1 месяц</h3>
  <div class="price">300<span>₽</span></div>
  <p class="note">Старт без обязательств.</p>
  <button>Подключить</button>
</div>
<div class="price-card featured">
  <span class="tag">★ Выгодно</span>
  <h3>12 месяцев</h3>
  <div class="price">2900<span>₽</span></div>
  <p class="note">Минус 19% против месячного.</p>
  <button>Подключить</button>
</div>
</body></html>
