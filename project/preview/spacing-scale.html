<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-base); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .box { background: rgba(64,224,208,0.12); border: 1px solid rgba(64,224,208,0.25); border-radius: 4px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; font-family: var(--font-mono); font-size: 10px; color: var(--accent); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); text-align: center; margin-top: 6px; }
  .tok { display: flex; flex-direction: column; align-items: center; }
</style></head>
<body>
<div class="row">
  <div class="tok"><div class="box" style="width:4px; height:4px"></div><div class="label">sp-1<br/>4</div></div>
  <div class="tok"><div class="box" style="width:8px; height:8px"></div><div class="label">sp-2<br/>8</div></div>
  <div class="tok"><div class="box" style="width:12px; height:12px"></div><div class="label">sp-3<br/>12</div></div>
  <div class="tok"><div class="box" style="width:16px; height:16px"></div><div class="label">sp-4<br/>16</div></div>
  <div class="tok"><div class="box" style="width:20px; height:20px"></div><div class="label">sp-5<br/>20</div></div>
  <div class="tok"><div class="box" style="width:24px; height:24px"></div><div class="label">sp-6<br/>24</div></div>
  <div class="tok"><div class="box" style="width:32px; height:32px"></div><div class="label">sp-8<br/>32</div></div>
  <div class="tok"><div class="box" style="width:44px; height:44px"></div><div class="label">sp-10<br/>44</div></div>
  <div class="tok"><div class="box" style="width:56px; height:56px"></div><div class="label">sp-12<br/>56</div></div>
  <div class="tok"><div class="box" style="width:80px; height:80px">80</div><div class="label">sp-16</div></div>
</div>
</body></html>
