<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; background: var(--bg-base); }
  .brand { display:inline-flex; align-items:center; gap:10px; font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--text-main); }
  .dot { width: 12px; height: 12px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 16px rgba(64,224,208,0.6); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 12px; display:block; }
</style></head>
<body>
<div class="brand"><span class="dot"></span>Mysterium Tech Portal</div>
<span class="label">Wordmark — Unbounded 700, 10px glowing turquoise dot</span>
</body></html>
