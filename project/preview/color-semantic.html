<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-base); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: 12px; padding: 14px; height: 96px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(255,255,255,0.06); }
  .name { font-family: var(--font-display); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; }
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:#40e0d0; color:#010810"><span class="name">Success</span><span class="hex">#40E0D0</span></div>
  <div class="sw" style="background:#5fb3d9; color:#010810"><span class="name">Info</span><span class="hex">#5FB3D9</span></div>
  <div class="sw" style="background:#d4a843; color:#010810"><span class="name">Warn</span><span class="hex">#D4A843</span></div>
  <div class="sw" style="background:#ff6b6b; color:#ffffff"><span class="name">Danger</span><span class="hex">#FF6B6B</span></div>
</div>
</body></html>
