<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-base); }
  .wrap { display: grid; gap: 18px; }
  .spec { display: grid; grid-template-columns: auto 1fr auto; gap: 18px; align-items: baseline; }
  .label { font-family: var(--font-display); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); min-width: 90px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); text-align: right; }
  .display { font-family: var(--font-display); font-weight: 700; font-size: 44px; line-height: 1.05; color: var(--text-main); }
  .display span { color: var(--accent); }
</style></head>
<body>
<div class="wrap">
  <div class="spec">
    <span class="label">Display</span>
    <span class="display">Mysterium <span>Tech</span></span>
    <span class="meta">Unbounded / 700<br/>clamp(2.5rem, 5vw, 4rem)</span>
  </div>
</div>
</body></html>
