<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-base); }
  .row { display: grid; grid-template-columns: 110px 1fr 180px; gap: 20px; align-items: baseline; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: 0; }
  .label { font-family: var(--font-display); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); text-align: right; }
  .body { font-family: var(--font-body); font-size: 16px; line-height: 1.65; color: var(--text-main); }
  .small { font-family: var(--font-body); font-size: 14px; line-height: 1.5; color: var(--text-muted); }
  .caption { font-family: var(--font-body); font-size: 12.5px; color: var(--text-muted); }
  .eyebrow-e { font-family: var(--font-display); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 500; }
  .mono-e { font-family: var(--font-mono); font-size: 14px; color: var(--text-main); }
</style></head>
<body>
<div class="row"><span class="label">Body</span><span class="body">Подключение и оплата через бот Telegram.</span><span class="meta">Manrope 400 · 16/1.65</span></div>
<div class="row"><span class="label">Body sm</span><span class="small">Серверы в 4 странах, до 3 устройств.</span><span class="meta">Manrope 400 · 14/1.5</span></div>
<div class="row"><span class="label">Caption</span><span class="caption">5 дней тестового периода</span><span class="meta">Manrope 400 · 12.5</span></div>
<div class="row"><span class="label">Eyebrow</span><span class="eyebrow-e">VPN / Безопасность</span><span class="meta">Unbounded 500 · 11.5 · tracking 0.08em</span></div>
<div class="row"><span class="label">Mono</span><span class="mono-e">@MysteriumTechBot</span><span class="meta">JetBrains Mono 400 · 14</span></div>
</body></html>
