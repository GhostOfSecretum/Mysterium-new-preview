<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--bg-base); overflow: hidden; }
  .wrap { position: relative; height: 220px; background:
    radial-gradient(500px 300px at 70% 30%, rgba(13,128,144,0.35) 0%, transparent 72%),
    radial-gradient(500px 300px at 20% 70%, rgba(26,143,168,0.30) 0%, transparent 65%),
    #010810;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .grid { position: absolute; inset: 0; background-image:
    linear-gradient(rgba(64,224,208,0.09) 1px, transparent 1px),
    linear-gradient(90deg, rgba(64,224,208,0.09) 1px, transparent 1px);
    background-size: 32px 32px; mask-image: radial-gradient(400px 200px at 50% 50%, black 30%, transparent 90%); }
  .ambient { position: absolute; inset: 0; background: linear-gradient(120deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1)); }
  .h { position: relative; z-index: 2; text-align: center; }
  .eye { font-family: var(--font-display); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent); margin-bottom: 10px; }
  .title { font-family: var(--font-display); font-weight: 700; font-size: 34px; color: var(--text-main); line-height: 1.05; }
  .title span { color: var(--accent); }
</style></head>
<body>
<div class="wrap">
  <div class="grid"></div>
  <div class="ambient"></div>
  <div class="h">
    <div class="eye">VPN / SECURITY / BOTS</div>
    <div class="title">Mysterium <span>Tech</span></div>
  </div>
</div>
</body></html>
