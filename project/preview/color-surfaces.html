<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-base); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { border-radius: 12px; padding: 12px; height: 96px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(255,255,255,0.04); }
  .name { font-family: var(--font-display); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:#010810; color:#d8eaf4"><span class="name">bg-base</span><span class="hex">#010810</span></div>
  <div class="sw" style="background:#061828; color:#d8eaf4"><span class="name">bg-soft</span><span class="hex">#061828</span></div>
  <div class="sw" style="background:#0a1826; color:#d8eaf4"><span class="name">bg-panel</span><span class="hex">#0A1826</span></div>
  <div class="sw" style="background:#0f2334; color:#d8eaf4"><span class="name">bg-elevated</span><span class="hex">#0F2334</span></div>
  <div class="sw" style="background: rgba(2,10,24,0.62); color:#d8eaf4; backdrop-filter: blur(8px); border:1px solid rgba(64,224,208,0.08)"><span class="name">Glass</span><span class="hex">02,10,24 / 62%</span></div>
  <div class="sw" style="background: rgba(2,10,24,0.90); color:#d8eaf4; border:1px solid rgba(64,224,208,0.10)"><span class="name">Glass Strong</span><span class="hex">02,10,24 / 90%</span></div>
  <div class="sw" style="background: rgba(64,224,208,0.04); color:#d8eaf4; border:1px solid rgba(64,224,208,0.08)"><span class="name">Glass Light</span><span class="hex">40E0D0 / 4%</span></div>
  <div class="sw" style="background:#ffffff; color:#010810"><span class="name">Text High</span><span class="hex">#FFFFFF</span></div>
</div>
</body></html>
