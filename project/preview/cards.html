<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background:
    radial-gradient(600px 400px at 90% -10%, rgba(13,128,144,0.22) 0%, transparent 72%),
    radial-gradient(500px 400px at -5% 40%, rgba(26,143,168,0.18) 0%, transparent 65%),
    var(--bg-base); display:flex; gap: 16px; }

  .card { background: rgba(2,10,24,0.62); border: 1px solid rgba(64,224,208,0.07); box-shadow: 0 20px 45px rgba(1,4,10,0.6); backdrop-filter: blur(14px); border-radius: 24px; padding: 22px; width: 220px; }
  .card h4 { font-family:var(--font-display); font-size: 14px; font-weight:600; margin:0 0 10px; color:var(--text-main); }
  .card p { font-family:var(--font-body); font-size: 13px; line-height:1.55; color:var(--text-muted); margin:0; }

  .card--featured {
    background:
      linear-gradient(150deg, rgba(64,224,208,0.10), rgba(26,143,168,0.05)),
      rgba(2,10,24,0.9);
    border-color: rgba(64,224,208,0.25);
  }
  .tag { font-family:var(--font-display); font-size: 9px; text-transform:uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 8px; display:block; }
</style></head>
<body>
<div class="card">
  <h4>Разработка ботов</h4>
  <p>Кастомные Telegram-боты под задачи вашей команды.</p>
</div>
<div class="card card--featured">
  <span class="tag">★ Выгодно</span>
  <h4>Годовой тариф</h4>
  <p>2900 ₽. 4 страны, 3 устройства.</p>
</div>
</body></html>
