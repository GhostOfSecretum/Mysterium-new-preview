<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-base); }
  .row { display: grid; grid-template-columns: 110px 1fr 180px; gap: 20px; align-items: baseline; padding: 14px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: 0; }
  .label { font-family: var(--font-display); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); text-align: right; }
  .s1 { font-family: var(--font-display); font-weight: 600; font-size: 40px; line-height: 1.1; color: var(--text-main); }
  .s2 { font-family: var(--font-display); font-weight: 600; font-size: 28px; line-height: 1.15; color: var(--text-main); }
  .s3 { font-family: var(--font-display); font-weight: 500; font-size: 20px; color: var(--text-main); }
  .s4 { font-family: var(--font-display); font-weight: 500; font-size: 16px; color: var(--text-main); }
</style></head>
<body>
<div class="row"><span class="label">H1</span><span class="s1">Разработка сайтов и ботов</span><span class="meta">Unbounded 600 · 40px</span></div>
<div class="row"><span class="label">H2</span><span class="s2">Тарифы и подключение</span><span class="meta">Unbounded 600 · 28px</span></div>
<div class="row"><span class="label">H3</span><span class="s3">Возможности сервиса</span><span class="meta">Unbounded 500 · 20px</span></div>
<div class="row"><span class="label">H4</span><span class="s4">Дополнительные опции</span><span class="meta">Unbounded 500 · 16px</span></div>
</body></html>
